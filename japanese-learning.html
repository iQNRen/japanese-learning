<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語学習 — Japanese Learning</title>
    <link rel="stylesheet" href="src/css/style.css">
    <script type="module" src="src/js/core.js" defer></script>
</head>

<body>

    <header>
        <h1>日本語学習</h1>
        <p class="subtitle">Japanese Learning</p>
    </header>

    <nav>
        <div class="nav-tab active" data-tab="gojuon">五十音</div>
        <div class="nav-tab" data-tab="words">单词</div>
        <div class="nav-tab" data-tab="sentences">句子</div>
        <div class="nav-tab" data-tab="quiz">测试</div>
    </nav>

    <div class="container">

        <!-- 五十音 Panel -->
        <section id="gojuon" class="panel active">
            <div id="gojuon-container">
                <div id="gojuon-table" class="gojuon-table">
                    <!-- Generated via JS -->
                </div>
            </div>
        </section>

        <!-- 单词 Panel -->
        <section id="words" class="panel">
            <div class="controls-area">
                <input type="text" id="word-search" class="search-input" placeholder="搜索单词...">
                <select id="word-category" class="filter-select">
                    <option value="all">全部分类</option>
                </select>
            </div>
            <div id="words-container" class="list-container">
                <!-- Generated via JS -->
            </div>
            <div id="words-pagination" class="pagination-area">
                <!-- Generated via JS -->
            </div>
        </section>

        <!-- 句子 Panel -->
        <section id="sentences" class="panel">
            <div class="controls-area">
                <input type="text" id="sentence-search" class="search-input" placeholder="搜索句子...">
                <select id="sentence-category" class="filter-select">
                    <option value="all">全部分类</option>
                </select>
            </div>
            <div id="sentences-container" class="sentence-list-container">
                <!-- Generated via JS -->
            </div>
            <div id="sentences-pagination" class="pagination-area">
                <!-- Generated via JS -->
            </div>
        </section>

        <!-- 测试 Panel -->
        <section id="quiz" class="panel">
            <div id="quiz-setup" class="quiz-card">
                <h2>选择测试模式</h2>
                <div style="display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.5rem;">
                    <button class="btn" onclick="window.quizManager.startQuiz('jp-cn')">日文 -> 中文</button>
                    <button class="btn" onclick="window.quizManager.startQuiz('jp-en')">日文 -> 英文</button>
                    <button class="btn" onclick="window.quizManager.startQuiz('en-jp')">英文 -> 日文</button>
                    <button class="btn" onclick="window.quizManager.startQuiz('roma-jp')">罗马音 -> 日文</button>
                    <button class="btn btn-accent" onclick="window.quizManager.startMemTest()">发音记忆测试 (50题)</button>
                </div>
            </div>

            <div id="quiz-active" class="quiz-card" style="display: none;">
                <div id="quiz-progress" style="margin-bottom: 0.5rem; color: var(--text-light); font-size: 0.85rem;"></div>
                <div class="quiz-question" id="quiz-q-text">?</div>
                <div class="quiz-options" id="quiz-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;">
                    <!-- Generated via JS -->
                </div>
                <div style="margin-top: 2rem;">
                    <button class="btn btn-secondary" onclick="window.quizManager.exitQuiz()">退出测试</button>
                </div>
            </div>

            <div id="quiz-result" class="quiz-card" style="display: none;">
                <h2>测试结果</h2>
                <div id="result-score" style="font-size: 2.5rem; margin: 1.5rem 0; font-family: var(--font-display); font-weight: 900; color: var(--asagi);"></div>
                <button class="btn btn-primary" onclick="window.quizManager.exitQuiz()">返回菜单</button>
            </div>
        </section>

    </div>

</body>

</html>
